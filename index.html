<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Les 8 ans de Julia</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Pacifico&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background"></div>

<div class="container">

    <div class="card">

        <div class="cake">
            🎂
        </div>

        <h1>Les 8 ans de</h1>

        <h2 class="julia">
            Julia
        </h2>

        <p class="subtitle">
            Julia fête bientôt ses 8 ans et serait ravie de partager cet après-midi avec toi ❤️
        </p>

        <div class="info">

            <div class="info-card">
                <span class="icon">📅</span>
                <div>
                    <strong>Date</strong><br>
                    Samedi 08 août 2026
                </div>
            </div>

            <div class="info-card">
                <span class="icon">🕑</span>
                <div>
                    <strong>Heure</strong><br>
                    À partir de 14h30
                </div>
            </div>

            <div class="info-card">
                <span class="icon">📍</span>
                <div>
                    <strong>Adresse</strong><br>
                    52 Chemin de Montauban
                </div>
            </div>

        </div>

        <div class="deadline">

            Merci de répondre avant le
            <strong>25 juillet 2026</strong>

        </div>

        <p class="welcome" id="invitee">
            Bonjour !
        </p>

        <p class="subtitle">
            Pourras-tu être présente ?
        </p>

        <div class="buttons">

            <button class="btn yes" onclick="reply('Présente')">
                😊 Je serai présente
            </button>

            <button class="btn no" onclick="reply('Absente')">
                ☹️ Je ne pourrai pas venir
            </button>

        </div>

        <div id="result"></div>

    </div>

</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbxK1NPjr9SN03-xPeP3dCTlmptkAIGKIo80QYOjzyO-jwWJtPzWr9n9hT-ILEyQH-aU/exec";

const params=new URLSearchParams(window.location.search);

const invitee=params.get("invite") || "Invitée";

document.getElementById("invitee").innerHTML=
`Bonjour <strong>${invitee}</strong> ! 🎉`;

async function reply(response){

    document.querySelectorAll("button").forEach(btn=>btn.disabled=true);

    document.getElementById("result").innerHTML="⏳ Enregistrement...";

    try{

        await fetch(SCRIPT_URL,{
            method:"POST",
            body:JSON.stringify({
                invitee,
                response
            })
        });

        document.getElementById("result").innerHTML=`
        <div class="success">

            <h3>🎉 Merci ${invitee} !</h3>

            <p>
                Ta réponse a bien été enregistrée.
            </p>

            <p>
                Julia a hâte de partager cette journée avec toi ❤️
            </p>

        </div>`;

    }
    catch{

        document.getElementById("result").innerHTML=`
        <div class="error">
            Une erreur est survenue. Merci de réessayer.
        </div>`;

        document.querySelectorAll("button").forEach(btn=>btn.disabled=false);

    }

}

</script>

</body>

</html>
