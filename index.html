<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Les 8 ans de Julia</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Pacifico&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background"></div>

<div class="container">

    <div class="card">

        <div class="cake">
            🎂
        </div>

        <h1>Les 8 ans de</h1>

        <h2 class="julia">
            Julia
        </h2>

        <p class="welcome" id="invitee">
            Bonjour !
        </p>

        <p class="subtitle">
            Julia serait très heureuse de partager son anniversaire avec toi ❤️
        </p>

        <div class="info">

            <div class="info-card">
                <span class="icon">📅</span>
                <div>
                    <strong>Samedi 08 août 2026</strong><br>
                    Dès 14h30
                </div>
            </div>

            <div class="info-card">
                <span class="icon">🕑</span>
                <div>
                    <strong>14h30 - 17h00</strong><br>
                    Goûter & jeux
                </div>
            </div>

            <div class="info-card">
                <span class="icon">📍</span>
                <div>
                    <strong>52 Chemin de Montauban</strong><br>
                    Saint-Denis
                </div>
            </div>

        </div>

        <div class="deadline">

            Réponse souhaitée avant le

            <strong>25 juillet 2026</strong>

        </div>

        <div class="buttons">

            <button class="btn yes"
                    onclick="reply('Présente')">

                🩷 Oui avec plaisir !

            </button>

            <button class="btn no"
                    onclick="reply('Absente')">

                🤍 Je ne pourrai pas venir

            </button>

        </div>

        <div id="result"></div>

    </div>

</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxK1NPjr9SN03-xPeP3dCTlmptkAIGKIo80QYOjzyO-jwWJtPzWr9n9hT-ILEyQH-aU/exec";

const params = new URLSearchParams(window.location.search);

const invitee = params.get("invite") || "Invitée";

document.getElementById("invitee").innerHTML =
`Bonjour <strong>${invitee}</strong> 💜`;

async function reply(response){

    document.querySelectorAll("button")
        .forEach(btn=>btn.disabled=true);

    document.getElementById("result").innerHTML =
    "⏳ Enregistrement...";

    try{

        await fetch(SCRIPT_URL,{
            method:"POST",
            body:JSON.stringify({
                invitee,
                response
            })
        });

        document.getElementById("result").innerHTML=`
            <div class="success">

                <h3>🎉 Merci ${invitee} !</h3>

                <p>
                    Ta réponse a bien été enregistrée.
                </p>

                <p>
                    Julia sera ravie de te retrouver le
                    <strong>08 août</strong> ❤️
                </p>

            </div>
        ;

    }
    catch{

        document.getElementById("result").innerHTML=`
        <div class="error">
            Une erreur est survenue.
        </div>
        `;

        document.querySelectorAll("button")
        .forEach(btn=>btn.disabled=false);

    }

}

</script>

</body>

</html>
