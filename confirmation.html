<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Merci ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Pacifico&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<style>

body{

display:flex;
justify-content:center;
align-items:center;
min-height:100vh;

}

.success-card{

max-width:520px;
width:90%;

background:white;

padding:45px;

border-radius:30px;

text-align:center;

box-shadow:0 20px 60px rgba(0,0,0,.12);

animation:fade .5s ease;

}

.success-card h1{

font-family:"Pacifico",cursive;

font-size:3rem;

color:#ff5f8f;

margin-bottom:15px;

}

.success-card h2{

margin-bottom:25px;

color:#6d49c7;

}

.success-card p{

line-height:1.8;

margin-bottom:18px;

}

.big{

font-size:75px;

margin-bottom:20px;

animation:float 3s ease-in-out infinite;

}

.home{

display:inline-block;

margin-top:20px;

padding:14px 28px;

border-radius:15px;

background:#6d49c7;

color:white;

text-decoration:none;

font-weight:600;

transition:.25s;

}

.home:hover{

transform:translateY(-2px);

}

</style>

</head>

<body>

<div class="success-card">

<div class="big">

🥳

</div>

<h1>

Merci !

</h1>

<h2 id="name">

</h2>

<p>

Ta réponse a bien été enregistrée.

</p>

<p id="message">

</p>

<p>

Julia a hâte de partager son anniversaire avec tous ses amis ❤️

</p>

<a class="home" href="accueil.html">

Retour

</a>

</div>

<script>

const params=new URLSearchParams(location.search);

const invite=params.get("invite") || "Invitée";

const response=params.get("response");

document.getElementById("name").innerHTML=
`Merci <strong>${invite}</strong> !`;

document.getElementById("message").innerHTML=

response==="Présente"

? "🎉 Super nouvelle ! Julia sera très heureuse de te retrouver le 8 août."

: "💜 Merci d'avoir répondu. Julia pensera très fort à toi.";

</script>

</body>

</html>
